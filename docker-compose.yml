
version: '3.9'
x-airflow-common:
  &airflow-common
  build: .
  # image: apache/airflow:2.8.1
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres-airflow/${AIRFLOW_DB_NAME}"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    # _PIP_ADDITIONAL_REQUIREMENTS: "scikit-learn xgboost lightgbm"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./data:/opt/airflow/data
    - ./models:/opt/airflow/models
  user: "${AIRFLOW_UID}:0"


#my postgress 

services:
  postgres-rossmann:    
    image: postgres:16
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: ${ROSSMANN_DB_PASSWORD}
      POSTGRES_USER: ${ROSSMANN_DB_USER}
      POSTGRES_DB: ${ROSSMANN_DB_NAME}
    volumes:
      - rossmann-db-volume:/var/lib/postgresql/data   

  pgweb:
    container_name: pgweb
    restart: always
    image: sosedoff/pgweb
    ports:
      - 8081:8081
    environment:
      - PGWEB_DATABASE_URL=postgres://${ROSSMANN_DB_USER}:${ROSSMANN_DB_PASSWORD}@postgres-rossmann:5432/${ROSSMANN_DB_NAME}?sslmode=disable
    depends_on:
      - postgres-rossmann

#airflow 
  postgres-airflow:
    image: postgres:13
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME} 
    volumes:
      -   airflow-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_DB_USER}"]
      interval: 5s
      retries: 5

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
  airflow-init:
    <<: *airflow-common
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    depends_on:
      postgres-airflow:
        condition: service_healthy

  streamlit:
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    ports:
     - "8501:8501"
    volumes:
      - ./streamlit_app:/app
    environment:
      - DB_HOST=postgres-rossmann
      - DB_PORT=5432
      - DB_NAME=${ROSSMANN_DB_NAME}
      - DB_USER=${ROSSMANN_DB_USER}
      - DB_PASSWORD=${ROSSMANN_DB_PASSWORD}
    depends_on:
      - postgres-rossmann


volumes:
  airflow-db-volume:
  rossmann-db-volume:
